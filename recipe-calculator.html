<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kalkulačka receptů</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-wrapper">

<h1>🧮 Kalkulačka receptů</h1>

<nav>
    <a href="index.html">🍽️ Recepty</a>
    <a href="planner.html">📋 Denní plán</a>
</nav>

<div class="form-container">
    <h2>Zadej recept</h2>

    <textarea id="ingredients" placeholder="Ingredience (formát: název - gramy)">
Banán - 100
Ovesné vločky - 40
Vejce - 50
    </textarea>

    <input id="baseWeight" type="number" placeholder="Základní hmotnost receptu (g)">
    <input id="targetWeight" type="number" placeholder="Moje porce (g)">

    <button id="calcBtn">Vypočítat</button>
</div>

<h2>Výsledek</h2>
<div id="result"></div>

<script src="calculator.js"></script>
</div><!-- end page-wrapper -->
<script>document.querySelectorAll('nav a').forEach(a => { if (a.getAttribute('href') === location.pathname.split('/').pop()) a.classList.add('active'); });</script>
</body>
</html>
