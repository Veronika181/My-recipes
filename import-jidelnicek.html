document.getElementById("import-btn").addEventListener("click", () => {
    const existing = JSON.parse(localStorage.getItem("recepty") || "[]");
    const existingTitles = new Set(existing.map(r => r.title));
    const newRecipes = DATA.recepty.filter(r => !existingTitles.has(r.title));
    localStorage.setItem("recepty", JSON.stringify([...existing, ...newRecipes]));

    const existingPlan = JSON.parse(localStorage.getItem("denni_plan") || "{}");
    Object.assign(existingPlan, DATA.plan);
    localStorage.setItem("denni_plan", JSON.stringify(existingPlan));

    const msg = document.getElementById("import-msg");
    msg.style.color = "#8bc34a";
    msg.textContent = `✓ Importováno ${newRecipes.length} jídel a ${Object.keys(DATA.plan).length} dní.`;

    // Zobraz přehled
    const preview = document.getElementById("preview");
    const list = document.getElementById("preview-list");
    preview.style.display = "block";
    list.innerHTML = Object.entries(DATA.plan).map(([datum, den]) => {
        const d = new Date(datum);
        const denTydne = ["Ne","Po","Út","St","Čt","Pá","So"][d.getDay()];
        const kcal = DATA.recepty.filter(r =>
            [...den.snidane,...den.obed,...den.svacina,...den.vecere].includes(r.title)
        ).reduce((s, r) => s + r.nutrition.kcal, 0);
        return `<div class="meal-list-row">
            <span class="recipe-title"><strong>${denTydne} ${datum.slice(8)}.${datum.slice(5,7)}.</strong></span>
            <span class="macro-info">⚡ ${kcal} kcal</span>
            <a href="planner.html?datum=${datum}" style="color:#4facfe; font-size:13px">Otevřít →</a>
        </div>`;
    }).join("");
});
